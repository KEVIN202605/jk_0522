        // --- 主程式 App ---
        function App() {
            const [activeTab, setActiveTab] = useState('itinerary');

            const targetDate = new Date('2026-05-23T00:00:00');
            const today = new Date();
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const countdownText = diffDays > 0 ? `倒數 ${diffDays} 天` : (diffDays >= -8 ? '蜜月中 💕' : '期待下次旅行');

            const handleCameraClick = (e) => {
                if(e.target.files && e.target.files.length > 0) {
                    alert('📸 捕捉到甜蜜瞬間！');
                }
            };

            return (
                <div className="w-full md:max-w-md mx-auto h-[100dvh] flex flex-col bg-[#f4f5f4] text-slate-800 font-sans shadow-2xl relative overflow-hidden">
                    {/* Header */}
                    <header className="bg-[#859A8F] text-white pt-10 pb-4 px-6 rounded-b-[2rem] shadow-md z-10 flex-shrink-0">

                                    <span className="text-xs bg-white/30 px-2 py-1 rounded-full font-bold shadow-sm border border-white/20 whitespace-nowrap">
                                        {countdownText}
                                    </span>
                                </div>
                                <p className="text-[#dbe3df] text-sm mt-1 flex items-center gap-1">

                                </p>
                            </div>

                                <CameraIcon size={24} />
                                <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handleCameraClick} />
                            </label>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 overflow-y-auto pb-24 scroll-smooth">
                        {activeTab === 'itinerary' && <ItineraryView />}
                        {activeTab === 'weather' && <WeatherView />}
                        {activeTab === 'expense' && <ExpenseView />}
                        {activeTab === 'info' && <InfoView />}
                    </main>

                    {/* Bottom Navigation */}
                    <nav className="bg-white absolute bottom-0 w-full h-20 rounded-t-[2rem] shadow-[0_-4px_20px_rgba(0,0,0,0.05)] flex justify-around items-center px-4 z-20">
                        <NavButton id="itinerary" icon={<MapIcon size={24} />} label="行程" isActive={activeTab === 'itinerary'} onClick={() => setActiveTab('itinerary')} />

                        <NavButton id="expense" icon={<WalletIcon size={24} />} label="記帳" isActive={activeTab === 'expense'} onClick={() => setActiveTab('expense')} />

                </button>
            );

            const [expandedDay, setExpandedDay] = useState(1);
            const today = new Date();
            const todayStr = `${today.getMonth() + 1}/${today.getDate()}`;
            const todayWeather = weatherData.find(w => w.date === todayStr) || { icon: "☀️", temp: "22° / 16°", desc: "晴朗舒適 (預報)", location: "東京" };

            return (
                <div className="p-4 space-y-4">

                        <div className="inline-flex items-center gap-2 bg-white/80 backdrop-blur-sm px-3 py-1.5 rounded-full shadow-sm text-sm border border-[#859A8F]/30 text-slate-600">

                            <span className="font-bold text-slate-700">{todayWeather.temp}</span>
                            <span className="text-xs text-slate-500 border-l border-slate-200 pl-2">{todayWeather.desc}</span>

                    </div>

                        <div key={day.id} className="bg-white rounded-2xl shadow-sm overflow-hidden transition-all duration-300">

                                <div className="flex items-center gap-4">
                                    <div className="bg-[#859A8F] text-white w-12 h-12 rounded-xl flex flex-col items-center justify-center shadow-inner">

                                        <span className="text-lg font-bold leading-none">{day.date.split('/')[1]}</span>
                                    </div>
                                    <div>
                                        <h3 className="font-bold text-slate-700 text-lg">Day {day.id}</h3>
                                        <p className="text-slate-500 text-sm flex items-center gap-1">
                                            <MapIcon size={12} className="text-[#859A8F]" /> {day.location}
                                        </p>
                                    </div>
                                </div>
                                <div>
                                    {expandedDay === day.id ? <ChevronUpIcon size={20} className="text-[#859A8F]" /> : <ChevronDownIcon size={20} className="text-slate-300" />}
                                </div>
                            </div>

                            {expandedDay === day.id && (
                                <div className="p-5 pt-2 border-t border-[#859A8F]/20">
                                    <div className="relative pl-4 border-l-2 border-[#859A8F]/40 ml-2 space-y-4 mb-6 mt-4">
                                        {day.activities.map((act, idx) => (
                                            <div key={idx} className="relative">
                                                <div className="absolute -left-[23px] top-1 w-3 h-3 bg-white border-2 border-[#859A8F] rounded-full"></div>
                                                <div className="text-sm font-semibold text-[#6c8276] mb-0.5">{act.time}</div>
                                                <div className="text-slate-600 text-sm">{act.desc}</div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="grid gap-3">
                                        {day.transport && (
                                            <div className="bg-blue-50 p-3 rounded-xl flex gap-3 text-sm items-start">
                                                <TrainIcon size={18} className="text-blue-500 mt-0.5 flex-shrink-0" />
                                                <div className="text-slate-700">{day.transport}</div>
                                            </div>
                                        )}
                                        {day.hotel && (
                                            <div className="bg-orange-50 p-3 rounded-xl flex gap-3 text-sm items-start">
                                                <HotelIcon size={18} className="text-orange-500 mt-0.5 flex-shrink-0" />
                                                <div className="text-slate-700 font-medium">{day.hotel}</div>
                                            </div>
                                        )}
                                        {day.notes && (
                                            <div className="bg-emerald-50 p-3 rounded-xl flex gap-3 text-sm items-start">
                                                <UtensilsIcon size={18} className="text-emerald-500 mt-0.5 flex-shrink-0" />
                                                <div className="text-slate-700">{day.notes}</div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    ))}
                </div>
            );
        }

        function WeatherView() {
            return (
                <div className="p-6">
                    <div className="mb-6">
                        <h2 className="text-xl font-bold text-slate-800">天氣預報參考</h2>
                        <p className="text-slate-500 text-sm mt-1">為你們的九天旅程準備舒適的穿搭</p>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-4">
                        {weatherData.map((day, idx) => (
                            <div key={idx} className="bg-white p-4 rounded-2xl shadow-sm flex flex-col items-center justify-center text-center">
                                <span className="text-slate-400 text-xs font-medium mb-2">{day.date}</span>
                                <div className="text-4xl mb-2 filter drop-shadow-sm">{day.icon}</div>
                                <span className="font-bold text-slate-700">{day.temp}</span>
                                <span className="text-slate-500 text-xs mt-1">{day.desc}</span>
                            </div>
                        ))}
                    </div>
                    <div className="mt-6 bg-white/60 p-4 rounded-xl border border-[#859A8F]/20 text-sm text-slate-600">
                        <p className="flex gap-2 items-center"><InfoIcon size={16} className="text-[#859A8F]" /> 五月底的日本天氣通常舒適，但早晚溫差稍大，建議帶一件薄外套或防風外套哦！箱根跟高尾山會比較涼。</p>
                    </div>
                </div>
            );
        }

        function ExpenseView() {
            const [expenses, setExpenses] = useState([
                { id: 1, desc: '機票', amount: 35000, category: '交通' },
                { id: 2, desc: '住宿訂金', amount: 15000, category: '住宿' },
            ]);
            const [newDesc, setNewDesc] = useState('');
            const [newAmount, setNewAmount] = useState('');

            const total = expenses.reduce((sum, item) => sum + Number(item.amount), 0);

            const handleAdd = (e) => {
                e.preventDefault();
                if (!newDesc || !newAmount) return;
                const newItem = {
                    id: Date.now(),
                    desc: newDesc,
                    amount: Number(newAmount),
                    category: '花費'
                };
                setExpenses([newItem, ...expenses]);
                setNewDesc('');
                setNewAmount('');
            };

            const handleDelete = (id) => {
                setExpenses(expenses.filter(e => e.id !== id));
            };

            return (
                <div className="p-4 flex flex-col h-full">
                    <div className="bg-gradient-to-r from-[#859A8F] to-slate-400 rounded-xl p-4 text-white shadow-md mb-4 relative overflow-hidden flex justify-between items-center">
                        <HeartIcon className="absolute -right-2 -bottom-4 opacity-10 w-24 h-24" />
                        <div className="relative z-10">
                            <span className="text-slate-100 text-xs font-medium">總花費 (TWD/JPY)</span>
                            <div className="text-3xl font-bold mt-0.5">
                                ${total.toLocaleString()}
                            </div>
                        </div>
                        <div className="bg-white/20 p-2 rounded-full backdrop-blur-sm relative z-10">
                            <WalletIcon size={20} className="text-white" />
                        </div>
                    </div>

                    <form onSubmit={handleAdd} className="bg-white rounded-xl p-3 shadow-sm mb-4 flex gap-2">
                        <div className="flex-1 space-y-2">
                            <input 
                                type="text" 
                                placeholder="項目名稱 (例如：敘敘苑燒肉)" 
                                className="w-full bg-slate-50 border border-slate-100 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#859A8F]/40"
                                value={newDesc}
                                onChange={(e) => setNewDesc(e.target.value)}
                            />
                            <input 
                                type="number" 
                                placeholder="金額" 
                                className="w-full bg-slate-50 border border-slate-100 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#859A8F]/40"
                                value={newAmount}
                                onChange={(e) => setNewAmount(e.target.value)}
                            />
                        </div>
                        <button 
                            type="submit" 
                            className="bg-[#859A8F] text-white rounded-xl px-4 flex flex-col items-center justify-center hover:bg-[#6c8276] transition shadow-sm"
                        >
                            <PlusIcon size={20} />
                            <span className="text-xs mt-1">新增</span>
                        </button>
                    </form>

                    <div className="flex-1 overflow-y-auto pb-4">
                        <h3 className="text-slate-700 font-bold mb-2 px-1 text-sm">花費明細</h3>
                        <div className="space-y-2">
                            {expenses.map((item) => (
                                <div key={item.id} className="bg-white p-3 rounded-xl shadow-sm flex justify-between items-center border border-slate-50">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-slate-50 p-1.5 rounded-full">
                                            <WalletIcon size={14} className="text-[#859A8F]" />
                                        </div>
                                        <div>
                                            <div className="text-slate-700 text-sm font-medium">{item.desc}</div>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <span className="text-[#6c8276] font-bold text-sm">${item.amount.toLocaleString()}</span>
                                        <button onClick={() => handleDelete(item.id)} className="text-slate-300 hover:text-red-400 transition p-1">
                                            <Trash2Icon size={16} />
                                        </button>
                                    </div>
                                </div>
                            ))}
                            {expenses.length === 0 && (
                                <div className="text-center text-slate-400 text-sm mt-8 bg-white/50 p-4 rounded-xl border border-slate-100">
                                    目前還沒有任何花費紀錄喔！
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function InfoView() {
            return (
                <div className="p-4 space-y-4">
                    <div className="bg-white rounded-2xl p-5 shadow-sm">
                        <h3 className="font-bold text-slate-800 text-lg flex items-center gap-2 mb-4">
                            <TrainIcon size={20} className="text-blue-500" /> 交通票券確認清單
                        </h3>
                        <ul className="space-y-3 text-sm text-slate-600">
                            <li className="flex items-center gap-2">
                                <input type="checkbox" className="w-4 h-4 text-[#859A8F] rounded border-gray-300 focus:ring-[#859A8F]" /> 
                                <span>現場購買 N'EX 或 巴士車票 (Day 1)</span>
                            </li>
                            <li className="flex items-center gap-2">
                                <input type="checkbox" className="w-4 h-4 text-[#859A8F] rounded border-gray-300 focus:ring-[#859A8F]" /> 
                                <span>預約 Saphir 踴子號、Odoriko 踴子號座位</span>
                            </li>
                            <li className="flex items-center gap-2">
                                <input type="checkbox" className="w-4 h-4 text-[#859A8F] rounded border-gray-300 focus:ring-[#859A8F]" /> 
                                <span>購買箱根周遊券</span>
                            </li>
                            <li className="flex items-center gap-2">
                                <input type="checkbox" className="w-4 h-4 text-[#859A8F] rounded border-gray-300 focus:ring-[#859A8F]" /> 
                                <span>購買小田急浪漫特快回程車票</span>
                            </li>
                            <li className="flex items-center gap-2">
                                <input type="checkbox" className="w-4 h-4 text-[#859A8F] rounded border-gray-300 focus:ring-[#859A8F]" /> 
                                <span>購買高崎新幹線往返車票</span>
                            </li>
                            <li className="flex items-center gap-2">
                                <input type="checkbox" className="w-4 h-4 text-[#859A8F] rounded border-gray-300 focus:ring-[#859A8F]" /> 
                                <span>預約 N'EX 特快 (回程)</span>
                            </li>
                        </ul>
                    </div>

                    <div className="bg-white rounded-2xl p-5 shadow-sm">
                        <h3 className="font-bold text-slate-800 text-lg flex items-center gap-2 mb-4">
                            <UtensilsIcon size={20} className="text-emerald-600" /> 必吃美食清單
                        </h3>
                        <div className="flex flex-wrap gap-2">
                            {[
                                { name: "荒井屋", q: "荒井屋 そごう横浜店" },
                                { name: "Okkon 壽喜燒", q: "Okkon izakaya sukiyaki" },
                                { name: "Merengue", q: "Merengue みなとみらい店" },
                                { name: "うなぎ池波", q: "うなぎ池波" },
                                { name: "長春館燒肉", q: "長春館 新宿" },
                                { name: "Echiré", q: "Echiré" },
                                { name: "A Happy Pancake", q: "A Happy Pancake Omotesando" },
                                { name: "Harbs", q: "Harbs 新宿" },
                                { name: "敘敘苑", q: "敘敘苑" },
                                { name: "極味屋", q: "極味屋 澀谷PARCO店" },
                                { name: "Bills", q: "Bills Omotesando" }
                            ].map((food, i) => (
                                <a 
                                    key={i} 
                                    href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(food.q)}`}
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="bg-emerald-50 text-emerald-700 hover:bg-emerald-100 px-3 py-1 rounded-full text-xs font-medium border border-emerald-100 transition-colors flex items-center gap-1"
                                >
                                    <MapPinIcon size={10} />
                                    {food.name}
                                </a>
                            ))}
                        </div>
                    </div>
                    
                    <div className="bg-[#859A8F]/10 rounded-2xl p-5 shadow-sm text-center border border-[#859A8F]/20">
                        <HeartIcon className="mx-auto text-[#859A8F] mb-2" size={32} />
                        <h3 className="font-bold text-[#45574d]">祝你們有趟美好的旅程！</h3>
                        <p className="text-[#5a6e63] text-sm mt-1">記得多拍點美麗的合照哦 📷</p>
                    </div>
                </div>
            );
        }

        // --- 渲染到畫面 ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
